[tool.pyrefly]
python_interpreter = ".venv/bin/python"

[tool.ruff]
line-length = 88
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "N"]
ignore = [
    "E501", # Line too long (Ruff format handles formatting; ignore E501 line length errors)
    "N802", # Function name should be lowercase (allow camelCase names like findOne)
    "N803", # Argument name should be lowercase
    "N806", # Local variable name should be lowercase
    "N815", # Variable name in class scope should be lowercase
    "E722", # Bare except
    "F841", # Unused local variables
    "E741", # Ambiguous variable name 'l'
    "E402", # Module level import not at top of file
    "E711", # Comparison to None should be is None
    "E712", # Comparison to False should be is False
]

[tool.mypy]
python_version = "3.11"
mypy_path = "."
explicit_package_bases = true
plugins = ["strawberry.ext.mypy_plugin"]
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
disallow_incomplete_defs = false
check_untyped_defs = true
ignore_missing_imports = true
