version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: focusly-postgres
    restart: always
    environment:
      POSTGRES_DB: focusly
      POSTGRES_USER: focusly_user
      POSTGRES_PASSWORD: focusly_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  web:
    build: .
    container_name: focusly-web
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://focusly_user:focusly_password@db:5432/focusly
    depends_on:
      - db

volumes:
  pgdata:
    driver: local
