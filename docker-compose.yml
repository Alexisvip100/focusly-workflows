
services:
  db:
    image: postgres:15-alpine
    container_name: focusly-postgres
    restart: always
    environment:
      POSTGRES_DB: focusly
      POSTGRES_USER: focusly_user
      POSTGRES_PASSWORD: focusly_password
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: focusly-redis
    restart: always
    ports:
      - '6379:6379'

  web:
    build: .
    container_name: focusly-web
    restart: always
    ports:
      - '3000:3000'
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://focusly_user:focusly_password@db:5432/focusly
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  pgdata:
    driver: local
